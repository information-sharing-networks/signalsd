# Multi-Container Performance Test Setup
# Simulates GCP autoscaling with multiple app containers
# Uses existing shared database at localhost:15432

services:

  # Load Balancer (nginx)
  loadbalancer:
    image: nginx:alpine
    container_name: signalsd-lb-multi
    ports:
      - "8081:80"  # Different port to avoid conflicts
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    networks:
      - multi-app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # App Container 1
  app1:
    build:
      context: /Users/nick.abson/dev/signals/signalsd
      dockerfile_inline: |
        FROM golang:1.24-alpine
        RUN apk add --no-cache bash postgresql-client curl jq vim git
        RUN echo "Installing Go tools..." && \
            go install github.com/pressly/goose/v3/cmd/goose@latest && \
            go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest && \
            go install github.com/swaggo/swag/cmd/swag@latest && \
            echo "Go tools installation complete"
        WORKDIR /signalsd
        CMD ["/bin/bash"]
    container_name: signalsd-app1-multi
    volumes:
      - /Users/nick.abson/dev/signals/signalsd:/signalsd
      - go-modules-multi:/go/pkg/mod
    environment:
      DOCKER_ENV: true
      SECRET_KEY: "multi-container-test-secret-key-12345"
      DATABASE_URL: postgres://signalsd-dev:@host.docker.internal:15432/signalsd_admin?sslmode=disable
      ENVIRONMENT: dev
      RATE_LIMIT_RPS: 0
      APP_INSTANCE: "app1"
    working_dir: /signalsd
    ports:
      - "8082:8080"  # Expose for direct testing
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      sh -c "cd /signalsd/app && go run cmd/signalsd/main.go"
    networks:
      - multi-app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # App Container 2
  app2:
    build:
      context: /Users/nick.abson/dev/signals/signalsd
      dockerfile_inline: |
        FROM golang:1.24-alpine
        RUN apk add --no-cache bash postgresql-client curl jq vim git
        RUN echo "Installing Go tools..." && \
            go install github.com/pressly/goose/v3/cmd/goose@latest && \
            go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest && \
            go install github.com/swaggo/swag/cmd/swag@latest && \
            echo "Go tools installation complete"
        WORKDIR /signalsd
        CMD ["/bin/bash"]
    container_name: signalsd-app2-multi
    volumes:
      - /Users/nick.abson/dev/signals/signalsd:/signalsd
      - go-modules-multi:/go/pkg/mod
    environment:
      DOCKER_ENV: true
      SECRET_KEY: "multi-container-test-secret-key-12345"
      DATABASE_URL: postgres://signalsd-dev:@host.docker.internal:15432/signalsd_admin?sslmode=disable
      ENVIRONMENT: dev
      RATE_LIMIT_RPS: 0
      APP_INSTANCE: "app2"
    working_dir: /signalsd
    ports:
      - "8083:8080"  # Expose for direct testing
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      sh -c "cd /signalsd/app && go run cmd/signalsd/main.go"
    networks:
      - multi-app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

