# docker-compose.yml (development env - mounts the local repo directory)
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    container_name: signalsd-db
    volumes:
      - db-data-dev:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: signalsd-dev
      POSTGRES_DB: signalsd_admin

    healthcheck:
      test: ["CMD-SHELL", "psql -U signalsd-dev -d signalsd_admin -c 'select 1;'"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2048M

  app:
    build:
      context: .
      args:
        # GO_VERSION should be extracted from app/go.mod and exported.
        # if using make to run docker-compose, this will be set automatically
        # otherwise set it in your env (`export GO_VERSION=$(grep '^go ' app/go.mod | awk '{print $2}')`)
        GO_VERSION: ${GO_VERSION}
      dockerfile_inline: |
        ARG GO_VERSION
        FROM golang:${GO_VERSION}-alpine

        # Install system dependencies in one layer for better caching
        RUN apk add --no-cache bash postgresql-client curl jq vim git

        # Install Go tools — versions pinned via go.mod/go.sum.
        # This layer is only rebuilt when go.sum changes, i.e. when a
        # tool or dependency version is deliberately updated.
        WORKDIR /build
        COPY app/tools.go app/go.mod app/go.sum ./
        RUN go install github.com/pressly/goose/v3/cmd/goose@latest && \
            go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest && \
            go install github.com/swaggo/swag/cmd/swag@latest && \
            go install honnef.co/go/tools/cmd/staticcheck@latest && \
            go install github.com/securego/gosec/v2/cmd/gosec@latest && \
            go install github.com/a-h/templ/cmd/templ@latest && \
            go install github.com/air-verse/air@latest && \
            go install golang.org/x/vuln/cmd/govulncheck && \
            cd / && rm -rf /build

        WORKDIR /signalsd

    container_name: signalsd-app
    volumes:
      - ./:/signalsd # project dir
      - go-modules:/go/pkg/mod # persist downloaded modules
    environment:
      # Required - container-specific values
      - DOCKER_ENV=true
      - SECRET_KEY=${SECRET_KEY:-dev-container-secret-key-12345}
      - DATABASE_URL=${DATABASE_URL:-postgres://signalsd-dev:@db:5432/signalsd_admin?sslmode=disable}

      # Optional overrides - pass through from shell if set, otherwise app uses defaults
      - HOST
      - PORT
      - ENVIRONMENT
      - LOG_LEVEL
      - READ_TIMEOUT
      - WRITE_TIMEOUT
      - IDLE_TIMEOUT
      - RATE_LIMIT_RPS
      - RATE_LIMIT_BURST
      - MAX_SIGNAL_PAYLOAD_SIZE
      - MAX_API_REQUEST_SIZE
      - ALLOWED_ORIGINS
    working_dir: /signalsd
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      sh -c "
        cd /signalsd/app &&
        echo 'Generating sqlc files...' &&
        sqlc generate &&
        echo 'Creating swagger documentation...' &&
        swag init -g ./cmd/signalsd/main.go &&
        echo 'Running database migrations...' &&
        goose -dir sql/schema postgres $$DATABASE_URL -env=none up &&
        echo 'Starting signalsd service (live reload)...' &&
        air 
      "
    networks:
        #go run -mod=readonly cmd/signalsd/main.go run all
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1024M

networks:
  app-network:
    driver: bridge

volumes:
  db-data-dev:
  go-modules:
