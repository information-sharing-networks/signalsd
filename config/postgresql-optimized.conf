# PostgreSQL Optimized Configuration for Signals Application
# Tested and proven settings for high-performance concurrent workloads
# Last updated: 2025-06-18
# Performance achieved: 728+ signals/sec with 191ms avg latency

# =============================================================================
# MEMORY SETTINGS
# =============================================================================
shared_buffers = 2GB                    # Main memory buffer (25% of 8GB RAM)
effective_cache_size = 6GB              # Available OS cache (75% of 8GB RAM)
work_mem = 16MB                         # Memory per sort/join operation
maintenance_work_mem = 512MB            # Memory for maintenance operations

# =============================================================================
# WAL (Write-Ahead Logging) SETTINGS - Critical for I/O Performance
# =============================================================================
wal_buffers = 64MB                      # WAL buffer size
max_wal_size = 4GB                      # Maximum WAL size before checkpoint
min_wal_size = 1GB                      # Minimum WAL size
checkpoint_completion_target = 0.9      # Spread checkpoints over 90% of interval
checkpoint_timeout = 15min              # Maximum time between checkpoints

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================
max_connections = 200                   # Maximum concurrent connections
superuser_reserved_connections = 3      # Reserved for superuser

# =============================================================================
# QUERY PLANNER SETTINGS
# =============================================================================
random_page_cost = 1.1                  # Cost of random page access (SSD optimized)
seq_page_cost = 1.0                     # Cost of sequential page access
effective_io_concurrency = 200          # Expected concurrent I/O operations (SSD)
max_worker_processes = 8                # Maximum background processes
max_parallel_workers_per_gather = 4     # Parallel workers per query
max_parallel_workers = 8                # Total parallel workers
max_parallel_maintenance_workers = 4    # Parallel maintenance workers

# =============================================================================
# BACKGROUND WRITER SETTINGS
# =============================================================================
bgwriter_delay = 200ms                  # Delay between background writer rounds
bgwriter_lru_maxpages = 100             # Max pages written per round
bgwriter_lru_multiplier = 2.0           # Multiplier for pages to write
bgwriter_flush_after = 512kB            # Flush after this much data

# =============================================================================
# AUTOVACUUM SETTINGS
# =============================================================================
autovacuum = on                          # Enable autovacuum
autovacuum_max_workers = 3               # Maximum autovacuum workers
autovacuum_naptime = 1min                # Time between autovacuum runs
autovacuum_vacuum_threshold = 50         # Minimum tuples before vacuum
autovacuum_analyze_threshold = 50        # Minimum tuples before analyze
autovacuum_vacuum_scale_factor = 0.2     # Fraction of table size for vacuum
autovacuum_analyze_scale_factor = 0.1    # Fraction of table size for analyze

# =============================================================================
# LOGGING SETTINGS (Minimal for Performance)
# =============================================================================
log_destination = 'stderr'              # Log to stderr
logging_collector = off                 # Disable log collector for performance
log_min_messages = warning              # Only log warnings and errors
log_min_error_statement = error         # Log statements causing errors
log_min_duration_statement = 1000       # Log queries taking > 1 second
log_checkpoints = on                    # Log checkpoint activity
log_connections = off                   # Disable connection logging
log_disconnections = off                # Disable disconnection logging
log_lock_waits = on                     # Log lock waits > deadlock_timeout

# =============================================================================
# STATISTICS SETTINGS
# =============================================================================
track_activities = on                   # Track running commands
track_counts = on                       # Track table/index access stats
track_io_timing = on                    # Track I/O timing (useful for monitoring)
track_functions = none                  # Disable function tracking for performance

# =============================================================================
# LOCK MANAGEMENT
# =============================================================================
deadlock_timeout = 1s                  # Time to wait before checking for deadlock
max_locks_per_transaction = 64          # Maximum locks per transaction

# =============================================================================
# CLIENT CONNECTION DEFAULTS
# =============================================================================
default_statistics_target = 100        # Default statistics target
constraint_exclusion = partition       # Enable constraint exclusion for partitions

# =============================================================================
# PERFORMANCE MONITORING
# =============================================================================
shared_preload_libraries = 'pg_stat_statements'  # Load query statistics extension
pg_stat_statements.max = 10000          # Maximum statements tracked
pg_stat_statements.track = all          # Track all statements
