# Simple Multi-Container Setup for Autoscaling Testing
# Based on docker-compose.perf-test.yml but with 2 app containers
# Uses existing database container at localhost:15432

services:
  # App Container 1
  app1:
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.24-alpine
        RUN apk add --no-cache bash postgresql-client curl jq vim git
        RUN echo "Installing Go tools..." && \
            go install github.com/pressly/goose/v3/cmd/goose@latest && \
            go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest && \
            go install github.com/swaggo/swag/cmd/swag@latest && \
            echo "Go tools installation complete"
        WORKDIR /signalsd
        CMD ["/bin/bash"]
    container_name: signalsd-app1-simple
    volumes:
      - ./:/signalsd # project dir
      - go-modules-simple:/go/pkg/mod # persist downloaded modules
    environment:
      DOCKER_ENV: true
      SECRET_KEY: "simple-multi-container-test-key-12345"
      DATABASE_URL: postgres://signalsd-dev:@host.docker.internal:15432/signalsd_admin?sslmode=disable
      ENVIRONMENT: dev
      RATE_LIMIT_RPS: 1000
      APP_INSTANCE: "app1"
    working_dir: /signalsd
    ports:
      - "8090:8080"  # App 1 on port 8090
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: >
      sh -c "cd /signalsd/app && go run cmd/signalsd/main.go"
    networks:
      - simple-multi-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # App Container 2
  app2:
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.24-alpine
        RUN apk add --no-cache bash postgresql-client curl jq vim git
        RUN echo "Installing Go tools..." && \
            go install github.com/pressly/goose/v3/cmd/goose@latest && \
            go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest && \
            go install github.com/swaggo/swag/cmd/swag@latest && \
            echo "Go tools installation complete"
        WORKDIR /signalsd
        CMD ["/bin/bash"]
    container_name: signalsd-app2-simple
    volumes:
      - ./:/signalsd # project dir
      - go-modules-simple:/go/pkg/mod # persist downloaded modules
    environment:
      DOCKER_ENV: true
      SECRET_KEY: "simple-multi-container-test-key-12345"
      DATABASE_URL: postgres://signalsd-dev:@host.docker.internal:15432/signalsd_admin?sslmode=disable
      ENVIRONMENT: dev
      RATE_LIMIT_RPS: 1000
      APP_INSTANCE: "app2"
    working_dir: /signalsd
    ports:
      - "8091:8080"  # App 2 on port 8091
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: >
      sh -c "cd /signalsd/app && go run cmd/signalsd/main.go"
    networks:
      - simple-multi-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  simple-multi-network:
    driver: bridge

volumes:
  go-modules-simple:
