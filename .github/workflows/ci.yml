name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Weekly scan on mondays

  workflow_dispatch:

permissions:
  security-events: write
  actions: read
  contents: read  

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod
          cache: true                                
          cache-dependency-path: app/go.sum    

      - name: Download Go modules
        run: go mod download

      - name: Run unit tests
        run: go test ./... || exit 1

      - name: Run integration tests
        run: go test -v -tags=integration ./test/integration/ || exit 1

  formatting:
    name: Formatting and linting
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod
          cache: true                                
          cache-dependency-path: app/go.sum    

      - name: Download Go modules
        run: go mod download

      - name: Check formatting
        run: go fmt ./... || exit 1

      - name: Run vet
        run: go vet ./... || exit 1

      - name: Run staticcheck
        run: go tool staticcheck ./... || exit 1

  security:
    name: Security analysis
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod
          cache: true                                
          cache-dependency-path: app/go.sum    

      - name: Download Go modules
        run: go mod download

      # exclude G120 - FormValue is used extensively in the UI handlers
      # and the size is limited by MaxBytesReader middleware (not detected by gosec)
      - name: Run gosec
        run: go tool gosec -exclude-generated -exclude=G120 ./...

      - name: Run govulncheck
        run: go tool govulncheck ./...

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository




