# Deploy to AWS staging environment on main branch commits
name: Deploy to AWS Staging

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write    # Required for OIDC token request to AWS
  contents: read

env:
  ENVIRONMENT: staging
  LOG_LEVEL: debug
  REGION: eu-west-1

jobs:
  deploy:
    name: Deploy to AWS Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    # Run on successful CI completion or manual dispatch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history including tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Download Go modules
        run: cd app && go mod download

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com"

          # Get Go version from go.mod
          GO_VERSION=$(grep '^go ' app/go.mod | awk '{print $2}')

          # Get version info for Docker build
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || git describe --tags --always --dirty)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GIT_COMMIT=$(git rev-parse --short HEAD)

          docker buildx build --build-arg GO_VERSION=${GO_VERSION} \
          --platform linux/amd64 \
          -f app/Dockerfile \
          --build-arg VERSION=${VERSION} \
          --build-arg BUILD_DATE=${BUILD_DATE} \
          --build-arg GIT_COMMIT=${GIT_COMMIT} \
          --push \
          -t ${REGISTRY}/signalsd:staging-${{ github.sha }} \
          -t ${REGISTRY}/signalsd:staging-latest \
          .

      - name: Open RDS access for runner
        run: |
          RDS_SG=$(aws ec2 describe-security-groups \
            --region ${{ env.REGION }} \
            --filters Name=tag:Project,Values=signalsd Name=group-name,Values=signalsd-rds \
            --query 'SecurityGroups[0].GroupId' --output text)
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RDS_SG=$RDS_SG" >> "$GITHUB_ENV"
          echo "RUNNER_IP=$RUNNER_IP" >> "$GITHUB_ENV"
          aws ec2 authorize-security-group-ingress \
            --group-id "$RDS_SG" --protocol tcp --port 5432 \
            --cidr "${RUNNER_IP}/32" --region ${{ env.REGION }}

      - name: Run migrations
        working-directory: app
        run: |
          DATABASE_URL=$(aws secretsmanager get-secret-value \
            --secret-id "signalsd/staging/database-url" \
            --query SecretString --output text)
          go tool goose -dir sql/schema postgres "$DATABASE_URL" up

      - name: Close RDS access for runner
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$RDS_SG" --protocol tcp --port 5432 \
            --cidr "${RUNNER_IP}/32" --region ${{ env.REGION }}

      - name: Get secret ARNs
        id: get-secrets
        run: |
          DB_SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "signalsd/${{ env.ENVIRONMENT }}/database-url" \
            --query ARN --output text)
          SK_SECRET_ARN=$(aws secretsmanager describe-secret \
            --secret-id "signalsd/${{ env.ENVIRONMENT }}/secret-key" \
            --query ARN --output text)
          echo "db-secret-arn=$DB_SECRET_ARN" >> "$GITHUB_OUTPUT"
          echo "sk-secret-arn=$SK_SECRET_ARN" >> "$GITHUB_OUTPUT"

      - name: Build environment variables
        id: env-vars
        run: |
          JSON=$(aws ssm get-parameters-by-path \
            --path "/signalsd/${{ env.ENVIRONMENT }}/" \
            --query 'Parameters[].{name:Name,value:Value}' \
            --output json \
            | jq -c \
                --arg env "${{ env.ENVIRONMENT }}" \
                --arg log "${{ env.LOG_LEVEL }}" \
                --arg ver "${{ github.ref_name }}" '
              map({
                name: (.name | split("/")[-1] | ascii_upcase | gsub("-"; "_")),
                value
              }) + [
                {name: "ENVIRONMENT", value: $env},
                {name: "LOG_LEVEL",   value: $log},
                {name: "VERSION",     value: $ver}
              ]')

          for required in PUBLIC_BASE_URL ALLOWED_ORIGINS; do
            echo "$JSON" | jq -e --arg n "$required" 'any(.name == $n)' >/dev/null \
              || { echo "Missing required SSM param: $required"; exit 1; }
          done

          echo "json=$JSON" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS Express
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: signalsd-staging
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.REGION }}.amazonaws.com/signalsd:staging-${{ github.sha }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecs-task-execution-signalsd
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecs-infrastructure-signalsd
          cluster: default
          secrets: >-
            [
              {"name":"DATABASE_URL","valueFrom":"${{ steps.get-secrets.outputs.db-secret-arn }}"},
              {"name":"SECRET_KEY","valueFrom":"${{ steps.get-secrets.outputs.sk-secret-arn }}"}
            ]
          environment-variables: ${{ steps.env-vars.outputs.json }}

      - name: Verify deployment
        run: |
          sleep 10
          BASE_URL=$(aws ssm get-parameter \
            --name "/signalsd/${{ env.ENVIRONMENT }}/public-base-url" \
            --query 'Parameter.Value' --output text)
          DEPLOYED=$(curl -sf "${BASE_URL}/version" | jq -r '.git_commit')
          EXPECTED=$(git rev-parse --short HEAD)
          if [ "$DEPLOYED" != "$EXPECTED" ]; then
            echo "Deployment verification failed: expected ${EXPECTED}, got ${DEPLOYED}"
            exit 1
          fi
          echo "Verified: ${DEPLOYED}"
