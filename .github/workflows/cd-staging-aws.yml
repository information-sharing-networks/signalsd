# Deploy to AWS staging environment on main branch commits
name: Deploy to AWS Staging

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write    # Required for OIDC token request to AWS
  contents: read

env:
  # Application configuration
  ENVIRONMENT: staging
  LOG_LEVEL: debug

jobs:
  deploy:
    name: Deploy to AWS Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    # Run on successful CI completion or manual dispatch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history including tags

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: app/go.mod
          cache: true
          cache-dependency-path: app/go.sum

      - name: Download Go modules
        run: cd app && go mod download

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} | \
            docker login --username AWS --password-stdin \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

      - name: Build and push Docker image
        run: |
          REGISTRY="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"

          # Get Go version from go.mod
          GO_VERSION=$(grep '^go ' app/go.mod | awk '{print $2}')

          # Get version info for Docker build
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || git describe --tags --always --dirty)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GIT_COMMIT=$(git rev-parse --short HEAD)

          docker buildx build --build-arg GO_VERSION=${GO_VERSION} \
          --platform linux/amd64 \
          -f app/Dockerfile \
          --build-arg VERSION=${VERSION} \
          --build-arg BUILD_DATE=${BUILD_DATE} \
          --build-arg GIT_COMMIT=${GIT_COMMIT} \
          --cache-from type=registry,ref=${REGISTRY}/signalsd:buildcache \
          --cache-to   type=registry,ref=${REGISTRY}/signalsd:buildcache,mode=max \
          --push \
          -t ${REGISTRY}/signalsd:staging-${{ github.sha }} \
          -t ${REGISTRY}/signalsd:staging-latest \
          .

      - name: Run migrations
        working-directory: app
        run: go tool goose -dir sql/schema postgres "${{ secrets.AWS_STAGING_DATABASE_URL }}" up

      - name: Deploy to App Runner
        run: |
          REGISTRY="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          ROLE_ARN="arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/apprunner-ecr-access"

          # Write source configuration to a temp file (avoids inline JSON escaping issues).
          # The file:// prefix tells the AWS CLI to read from disk.
          cat > /tmp/source-config.json << EOF
          {
            "ImageRepository": {
              "ImageIdentifier": "${REGISTRY}/signalsd:staging-${{ github.sha }}",
              "ImageConfiguration": {
                "Port": "8080",
                "RuntimeEnvironmentVariables": {
                  "DATABASE_URL": "${{ secrets.AWS_STAGING_DATABASE_URL }}",
                  "SECRET_KEY": "${{ secrets.AWS_STAGING_SECRET_KEY }}",
                  "ENVIRONMENT": "${{ env.ENVIRONMENT }}",
                  "LOG_LEVEL": "${{ env.LOG_LEVEL }}",
                  "PUBLIC_BASE_URL": "${{ vars.AWS_STAGING_PUBLIC_BASE_URL }}",
                  "ALLOWED_ORIGINS": "${{ vars.AWS_STAGING_ALLOWED_ORIGINS }}"
                }
              },
              "ImageRepositoryType": "ECR"
            },
            "AuthenticationConfiguration": {
              "AccessRoleArn": "${ROLE_ARN}"
            },
            "AutoDeploymentsEnabled": false
          }
          EOF
          chmod 600 /tmp/source-config.json

          # Add optional tuning variables if configured
          if [ -n "${{ vars.DB_MAX_CONNECTIONS }}" ]; then
            jq --arg v "${{ vars.DB_MAX_CONNECTIONS }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.DB_MAX_CONNECTIONS = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.DB_MIN_CONNECTIONS }}" ]; then
            jq --arg v "${{ vars.DB_MIN_CONNECTIONS }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.DB_MIN_CONNECTIONS = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.DB_MAX_CONN_LIFETIME }}" ]; then
            jq --arg v "${{ vars.DB_MAX_CONN_LIFETIME }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.DB_MAX_CONN_LIFETIME = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.DB_MAX_CONN_IDLE_TIME }}" ]; then
            jq --arg v "${{ vars.DB_MAX_CONN_IDLE_TIME }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.DB_MAX_CONN_IDLE_TIME = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.DB_CONNECT_TIMEOUT }}" ]; then
            jq --arg v "${{ vars.DB_CONNECT_TIMEOUT }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.DB_CONNECT_TIMEOUT = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.RATE_LIMIT_RPS }}" ]; then
            jq --arg v "${{ vars.RATE_LIMIT_RPS }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.RATE_LIMIT_RPS = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.RATE_LIMIT_BURST }}" ]; then
            jq --arg v "${{ vars.RATE_LIMIT_BURST }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.RATE_LIMIT_BURST = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.MAX_SIGNAL_PAYLOAD_SIZE }}" ]; then
            jq --arg v "${{ vars.MAX_SIGNAL_PAYLOAD_SIZE }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.MAX_SIGNAL_PAYLOAD_SIZE = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.READ_TIMEOUT }}" ]; then
            jq --arg v "${{ vars.READ_TIMEOUT }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.READ_TIMEOUT = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.WRITE_TIMEOUT }}" ]; then
            jq --arg v "${{ vars.WRITE_TIMEOUT }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.WRITE_TIMEOUT = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi
          if [ -n "${{ vars.IDLE_TIMEOUT }}" ]; then
            jq --arg v "${{ vars.IDLE_TIMEOUT }}" \
              '.ImageRepository.ImageConfiguration.RuntimeEnvironmentVariables.IDLE_TIMEOUT = $v' \
              /tmp/source-config.json > /tmp/tmp.json && mv /tmp/tmp.json /tmp/source-config.json
          fi

          # Start the deployment
          aws apprunner update-service \
            --service-arn "${{ secrets.AWS_STAGING_APP_RUNNER_ARN }}" \
            --source-configuration file:///tmp/source-config.json \
            --region ${{ vars.AWS_REGION }}

          # Poll until deployment completes — App Runner's update-service returns
          # immediately (unlike gcloud run deploy which blocks), so we must wait.
          echo "Waiting for deployment..."
          TIMEOUT=600
          ELAPSED=0
          while true; do
            STATUS=$(aws apprunner describe-service \
              --service-arn "${{ secrets.AWS_STAGING_APP_RUNNER_ARN }}" \
              --region ${{ vars.AWS_REGION }} \
              --query 'Service.Status' --output text)
            echo "  Status: $STATUS"
            case "$STATUS" in
              RUNNING)
                echo "Deployment complete"
                break
                ;;
              OPERATION_IN_PROGRESS)
                if [ $ELAPSED -ge $TIMEOUT ]; then
                  echo "Deployment timed out after ${TIMEOUT}s"
                  exit 1
                fi
                sleep 15
                ELAPSED=$((ELAPSED + 15))
                ;;
              *)
                echo "Deployment failed with status: $STATUS"
                exit 1
                ;;
            esac
          done
